# SMPLGait — inference on custom data (layout: <id>/camXX/seqYY/).
#
# Edit only the following (paths absolute or relative to opengait/ when you run main.py):
#   dataset_root       → *-smpls-pkl directory
#   dataset_partition  → .json with TRAIN_SET / TEST_SET
#   sil_dir_name       → parallel sil folder name (e.g. MyData-sils-m2f)
#   restore_hint       → checkpoint .pt
#   dataset_name       → (optional) name used under output/

data_cfg:
  dataset_name: MyDataset
  test_dataset_name: MyDataset
  dataset_root: your_path
  dataset_partition: your_path
  sil_dir_name: your_sil_folder_name
  data_in_use: [true, true]
  num_workers: 2
  remove_no_gallery: false
  cache: false

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: false
  restore_hint: your_path
  save_name: SMPLGait
  eval_func: evaluate_simple
  probe_view_substring: seq00
  sampler:
    batch_shuffle: false
    batch_size: 1
    sample_type: all_ordered
    frames_all_limit: 720
    type: InferenceSampler
  metric: euc
  transform:
    - type: BaseSilCuttingTransform
      img_w: 64
    - type: NoOperation

model_cfg:
  model: SMPLGait
  backbone_cfg:
    in_channels: 1
    layers_cfg:
      - BC-64
      - BC-64
      - M
      - BC-128
      - BC-128
      - M
      - BC-256
      - BC-256
    type: Plain
  SeparateFCs:
    in_channels: 256
    out_channels: 256
    parts_num: 31
  SeparateBNNecks:
    class_num: 3000
    in_channels: 256
    parts_num: 31
  bin_num:
    - 16
    - 8
    - 4
    - 2
    - 1

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.2
    type: TripletLoss
    log_prefix: triplet
  - loss_term_weight: 0.1
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true

optimizer_cfg:
  lr: 0.1
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones:
    - 20000
    - 40000
    - 50000
  scheduler: MultiStepLR

trainer_cfg:
  find_unused_parameters: false
  enable_float16: true
  fix_BN: false
  log_iter: 100
  with_test: false
  restore_ckpt_strict: false
  restore_hint: 0
  save_iter: 10000
  save_name: SMPLGait
  sync_BN: false
  total_iter: 60000
  sampler:
    batch_shuffle: true
    batch_size: [8, 4]
    frames_num_fixed: 30
    frames_num_max: 50
    frames_num_min: 25
    sample_type: fixed_unordered
    type: TripletSampler
  transform:
    - type: BaseSilCuttingTransform
      img_w: 64
    - type: NoOperation
